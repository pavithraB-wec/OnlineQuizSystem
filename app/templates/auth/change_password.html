{% extends 'base.html' %}

{% block title %}Change Password - Online Quiz System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-key"></i> Change Password</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="old_password" class="form-label">Current Password</label>
                            <input type="password" class="form-control form-control-lg" id="old_password" 
                                   name="old_password" placeholder="Enter current password" required>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <input type="password" class="form-control form-control-lg" id="new_password" 
                                   name="new_password" placeholder="Enter new password" required>
                            <small class="text-muted">Min. 6 characters</small>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control form-control-lg" id="confirm_password" 
                                   name="confirm_password" placeholder="Confirm new password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-2">
                            <i class="fas fa-check"></i> Update Password
                        </button>
                        <a href="{{ url_for('auth.profile') }}" class="btn btn-secondary btn-lg w-100">
                            <i class="fas fa-arrow-left"></i> Cancel
                        </a>
                    </form>

                    <div class="alert alert-info mt-3">
                        <i class="fas fa-info-circle"></i> 
                        Make sure your password is strong and unique for security.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
